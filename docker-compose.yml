version: '3.8'

services:
  # API 调度网关
  api-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-proxy-gateway
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      LOG_LEVEL: INFO
      BACKENDS_CONFIG_PATH: ./config/backends.json
      HEALTH_CHECK_INTERVAL: 30
      REQUEST_TIMEOUT: 30
      HEALTH_CHECK_TIMEOUT: 5
    volumes:
      - ./server/config:/app/config
      - ./server/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 可选：Nginx 反向代理
  # nginx:
  #   image: nginx:alpine
  #   container_name: api-proxy-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api-proxy
  #   restart: unless-stopped

volumes:
  config:
  logs:
